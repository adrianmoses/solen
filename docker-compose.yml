name: edgeclaw

services:
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    restart: unless-stopped
    env_file: .env
    environment:
      - SKILL_GOOGLE_WORKSPACE_URL=http://workspace-mcp:8000
    volumes:
      - agent-data:/data
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - workspace-mcp

  workspace-mcp:
    image: ghcr.io/taylorwilsdon/google_workspace_mcp
    restart: unless-stopped
    environment:
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - USER_GOOGLE_EMAIL=${USER_GOOGLE_EMAIL}
      - TOOL_TIER=core

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      agent:
        condition: service_healthy

volumes:
  agent-data:
  caddy-data:
  caddy-config:
