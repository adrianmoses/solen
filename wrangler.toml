name = "edgeclaw"
main = "crates/edgeclaw-worker/build/worker/shim.mjs"
compatibility_date = "2026-01-01"

[build]
command = "cargo install -q worker-build && worker-build --release crates/edgeclaw-worker"

[[durable_objects.bindings]]
name = "AGENT_DO"
class_name = "AgentDo"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentDo"]

[vars]
CLAUDE_MODEL = "claude-sonnet-4-20250514"

# Override via .dev.vars locally or `wrangler secret put` for production:
# ANTHROPIC_API_KEY
# SKILL_ENCRYPTION_KEY (AES-256-GCM key for per-skill auth credentials)
# ANTHROPIC_BASE_URL (optional)

# Service bindings for skill workers (requires skills to be deployed first)
# [[services]]
# binding = "SKILL_WEB_SEARCH"
# service = "skill-web-search"
#
# [[services]]
# binding = "SKILL_HTTP_FETCH"
# service = "skill-http-fetch"
#
# [[services]]
# binding = "SKILL_MEMORY"
# service = "skill-memory"
