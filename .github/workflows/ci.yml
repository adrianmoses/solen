name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Check agent-core (native)
        run: cargo check -p agent-core

      - name: Check agent-core (wasm32)
        run: cargo check -p agent-core --target wasm32-unknown-unknown

      - name: Check mcp-client (native)
        run: cargo check -p mcp-client

      - name: Check mcp-client (wasm32)
        run: cargo check -p mcp-client --target wasm32-unknown-unknown

      - name: Check skill-registry (native)
        run: cargo check -p skill-registry

      - name: Check skill-registry (wasm32)
        run: cargo check -p skill-registry --target wasm32-unknown-unknown

      - name: Check mcp-server-util
        run: cargo check -p mcp-server-util

      - name: Check edgeclaw-worker (wasm32)
        run: cargo check -p edgeclaw-worker --target wasm32-unknown-unknown

      - name: Check skill-memory (wasm32)
        run: cargo check -p skill-memory --target wasm32-unknown-unknown

      - name: Check skill-web-search (wasm32)
        run: cargo check -p skill-web-search --target wasm32-unknown-unknown

      - name: Check skill-http-fetch (wasm32)
        run: cargo check -p skill-http-fetch --target wasm32-unknown-unknown

      - name: Check skill-schedule (wasm32)
        run: cargo check -p skill-schedule --target wasm32-unknown-unknown

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Clippy agent-core
        run: cargo clippy -p agent-core -- -D warnings

      - name: Clippy mcp-client
        run: cargo clippy -p mcp-client -- -D warnings

      - name: Clippy skill-registry
        run: cargo clippy -p skill-registry -- -D warnings

      - name: Clippy mcp-server-util
        run: cargo clippy -p mcp-server-util -- -D warnings

      - name: Clippy edgeclaw-worker (wasm32)
        run: cargo clippy -p edgeclaw-worker --target wasm32-unknown-unknown -- -D warnings

      - name: Clippy skill-memory (wasm32)
        run: cargo clippy -p skill-memory --target wasm32-unknown-unknown -- -D warnings

      - name: Clippy skill-web-search (wasm32)
        run: cargo clippy -p skill-web-search --target wasm32-unknown-unknown -- -D warnings

      - name: Clippy skill-http-fetch (wasm32)
        run: cargo clippy -p skill-http-fetch --target wasm32-unknown-unknown -- -D warnings

      - name: Clippy skill-schedule (wasm32)
        run: cargo clippy -p skill-schedule --target wasm32-unknown-unknown -- -D warnings

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        run: npm install

      - name: Build worker
        run: cargo install -q worker-build && worker-build --release crates/edgeclaw-worker

      - name: Run integration tests
        run: npm test
