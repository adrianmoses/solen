name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check agent-core (native)
        run: cargo check -p agent-core

      - name: Check mcp-client (native)
        run: cargo check -p mcp-client

      - name: Check skill-registry (native)
        run: cargo check -p skill-registry

      - name: Check edgeclaw-server
        run: cargo check -p edgeclaw-server

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Clippy agent-core
        run: cargo clippy -p agent-core -- -D warnings

      - name: Clippy mcp-client
        run: cargo clippy -p mcp-client -- -D warnings

      - name: Clippy skill-registry
        run: cargo clippy -p skill-registry -- -D warnings

      - name: Clippy edgeclaw-server
        run: cargo clippy -p edgeclaw-server -- -D warnings
