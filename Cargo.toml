[workspace]
resolver = "2"
members = [
    "crates/agent-core",
    "crates/mcp-client",
    "crates/skill-registry",
    "crates/edgeclaw-worker",
    "skills/mcp-server-util",
    "skills/skill-memory",
    "skills/skill-web-search",
    "skills/skill-http-fetch",
    "skills/skill-schedule",
    "crates/edgeclaw-server",
]
# edgeclaw-worker is wasm32-only and conflicts with native feature unification.
# Check it separately: cargo check -p edgeclaw-worker --target wasm32-unknown-unknown
default-members = [
    "crates/agent-core",
    "crates/mcp-client",
    "crates/skill-registry",
    "crates/edgeclaw-server",
    "skills/mcp-server-util",
    "skills/skill-memory",
    "skills/skill-web-search",
    "skills/skill-http-fetch",
    "skills/skill-schedule",
]
